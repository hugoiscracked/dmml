[CLI]
# Default render quality for DMML lecture animations.
# fourk_quality = 3840x2160 @ 60fps — a 4K master downscales cleanly onto any
# projector (supersampled AA looks sharper than a native 1080p render).
# Override per-run with -ql (480p15 preview) / -qh (1080p60) / -qp (1440p60).
quality = fourk_quality
disable_caching = False
